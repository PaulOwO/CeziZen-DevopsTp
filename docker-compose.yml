services:
  # ── Base de données ────────────────────────────────────────────
  db:
    image: postgres:16
    restart: always
    # Identifiants injectés depuis le fichier .env (non versionné) —
    # aucun secret en dur dans ce fichier. Voir .env.example.
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Healthcheck : "démarré" ≠ "prêt à accepter des connexions".
    # Les autres services attendront que ce test passe (service_healthy).
    # $$ échappe l'interpolation Compose → la variable est lue dans le conteneur.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Job de migration (tourne une fois puis s'arrête) ───────────
  # Réutilise le stage `builder` du Dockerfile : lui SEUL possède la
  # CLI Prisma + le schéma. L'image finale (runner) en est dépourvue.
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      # Hôte = `db` : le nom du service, résolu par le DNS interne de Compose.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  # ── Application Nuxt ───────────────────────────────────────────
  app:
    build:
      context: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Secret de session nuxt-auth-utils (>= 32 caractères), injecté depuis .env.
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      # L'app ne démarre qu'une fois le schéma déployé avec succès.
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
