# ─────────────────────────────────────────────────────────────────
# Override de DÉPLOIEMENT (TP4 — CD local)
# À COMBINER avec le compose de base (fusion des deux fichiers) :
#   docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d
#
# Rôle : basculer de « build local » à « pull de l'image publiée ».
# On déploie EXACTEMENT l'artefact testé et poussé en CI (reproductibilité),
# au lieu de le reconstruire sur la machine cible.
#
# Ce fichier ne contient QUE les deltas : `db`, `volumes`, `ports`,
# `depends_on`… restent hérités du docker-compose.yml de base.
# ⚠️ Le base définit `build:` sur `app` et `migrate` ; un override ne peut
#    pas SUPPRIMER cette clé, seulement en ajouter (`image:`). Les deux
#    coexistent donc après fusion → on déploie avec `up -d --no-build`
#    (voir le pipeline) pour interdire tout rebuild et n'utiliser QUE
#    l'image tirée.
#
# TAG : version publiée par semantic-release (ex. 1.2.0), injectée par le
#       pipeline. `:-latest` = valeur de repli pour un déploiement manuel.
#
# ISOLATION dev ↔ déploiement (`name:`).
#   Le dev (docker-compose.yml seul) utilise le projet par défaut
#   `cezizen-devopstp` (nom du dossier). Le déploiement force un projet
#   DISTINCT `cezizen-deploy` → ses conteneurs ET son volume sont séparés.
#   Sans ça, dev et déploiement partagent le même volume Postgres alors
#   qu'ils ont des mots de passe différents (dev = .env local, déploiement =
#   GitHub Secrets) → « password authentication failed » (Postgres fige le
#   mot de passe à la 1re création du volume). Ce `name:` du dernier fichier
#   fusionné l'emporte, sans toucher aux workflows.
#   ⚠️ Corollaire : ne pas lancer le stack dev ET le stack déploiement en
#      même temps (ils se disputeraient les ports 3000/5432).
# ─────────────────────────────────────────────────────────────────
name: cezizen-deploy

services:
  # Job de migration : MÊME image que l'app (choix 2B « migrations
  # embarquées »). L'image publiée porte la CLI Prisma + ses moteurs.
  migrate:
    image: ghcr.io/paulowo/cezizen-devopstp:${TAG:-latest}
    # On appelle le binaire Prisma par son chemin explicite plutôt que via
    # `npx` : aucune tentative d'installation réseau, comportement déterministe.
    # `migrate deploy` est idempotent (ne rejoue que les migrations en
    # attente) et non destructif → rejouable sans risque pour les données.
    command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]

  # Application : l'image publiée démarre avec sa CMD par défaut (serveur Nuxt).
  app:
    image: ghcr.io/paulowo/cezizen-devopstp:${TAG:-latest}
