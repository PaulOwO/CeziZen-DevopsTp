name: Dependency Check & Audit

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    name: NPM Security Audit
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Generate audit report
        run: npm audit --json > audit-report.json
        continue-on-error: true
      
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Freshness Check
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Check for outdated packages
        run: npm outdated || true
      
      - name: Create issue for outdated packages
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Maintenance] Outdated dependencies detected',
              body: 'Automated check found outdated packages. Review and update as needed.\n\nRun `npm outdated` for details.',
              labels: ['technical-debt', 'maintenance']
            })

  security-headers:
    runs-on: ubuntu-latest
    name: Security Headers Check
    steps:
      - uses: actions/checkout@v4
      
      - name: Check nuxt.config.ts for security headers
        run: |
          if grep -q "httpOnly" nuxt.config.ts; then
            echo "✓ Security headers configured"
          else
            echo "⚠ Review security headers configuration"
          fi
