name: Dependency Check & Audit

on:
  schedule:
    # Chaque lundi à 9h UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Actions épinglées à un SHA de commit immuable (# vX.Y.Z) — sécurité supply-chain.
# Voir docs/decisions.md et docs/SECURITY_PLAN.md. Bump automatique via Dependabot.
jobs:
  npm-audit:
    runs-on: ubuntu-latest
    name: NPM Security Audit
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate audit report
        run: npm audit --json > audit-report.json
        continue-on-error: true

      - name: Upload audit report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-audit-report
          path: audit-report.json

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Freshness Check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check for outdated packages
        run: npm outdated || true

      - name: Create issue for outdated packages
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Maintenance] Outdated dependencies detected',
              body: 'Automated check found outdated packages. Review and update as needed.\n\nRun `npm outdated` for details.',
              labels: ['technical-debt', 'maintenance']
            })

  security-headers:
    runs-on: ubuntu-latest
    name: Security Headers Check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Vérifie que les en-têtes de sécurité HTTP sont bien configurés dans
      # nuxt.config.ts (Content-Security-Policy + X-Frame-Options). Bloque le
      # job s'ils disparaissent — garde-fou de non-régression sécurité.
      - name: Check nuxt.config.ts for security headers
        run: |
          missing=0
          for header in "Content-Security-Policy" "X-Frame-Options" "X-Content-Type-Options" "Strict-Transport-Security"; do
            if grep -q "$header" nuxt.config.ts; then
              echo "OK - $header present"
            else
              echo "MISSING - $header absent de nuxt.config.ts"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Echec: des en-tetes de securite sont absents."
            exit 1
          fi
          echo "Tous les en-tetes de securite requis sont configures."
