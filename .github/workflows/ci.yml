name: CI Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

# Droits accordés au GITHUB_TOKEN (jeton éphémère injecté par Actions).
# Aucun secret à stocker manuellement : GitHub gère le jeton.
permissions:
  contents: write # semantic-release : pousser le tag Git + créer la Release
  packages: write # pousser l'image sur GHCR
  issues: write # semantic-release : commenter les issues incluses dans la release
  pull-requests: write # idem pour les PR

jobs:
  ci:
    runs-on: self-hosted # ton runner local

    # Sortie du job : la version publiée (ex. 1.2.0), ou vide si aucune
    # release. Le job `deploy` la lit via needs.ci.outputs.version pour
    # (a) savoir s'il doit déployer, (b) tirer le bon tag d'image.
    outputs:
      version: ${{ steps.publish.outputs.version }}

    # Windows PowerShell 5.1 (toujours présent sur le runner Windows).
    # Évite l'ambiguïté de `shell: bash` qui pointait vers WSL (cassé) au lieu de Git Bash.
    defaults:
      run:
        shell: powershell

    steps:
      # 1. Récupère le code source
      #    fetch-depth: 0 = historique COMPLET + tags. Indispensable à
      #    semantic-release, qui compare les commits depuis la dernière release.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Installe Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Installe les dépendances (équivalent npm install mais reproductible)
      - name: Install dependencies
        run: npm ci

      # 4. Lint — vérifie la qualité du code
      - name: Lint
        run: npm run lint

      # 5. Build — vérifie que le projet compile sans erreur
      - name: Build
        run: npm run build

      # 6. Tests — lance vitest en mode one-shot (pas de watch)
      - name: Tests
        run: npm test -- --run

      # 7. Démarre une base PostgreSQL jetable (shadow database) pour le garde-fou.
      #    Conteneur + port dédiés (5433) pour ne PAS interférer avec la base de dev (5432).
      #    Auth `trust` (aucun mot de passe) : base sans données, détruite en fin de job.
      #    La base `shadow` est créée vide automatiquement par l'image postgres.
      - name: Start shadow database
        run: |
          $ErrorActionPreference = 'Continue'
          if (docker ps -aq -f name=prisma-shadow-db) { docker rm -f prisma-shadow-db | Out-Null }
          docker run -d --name prisma-shadow-db `
            -e POSTGRES_USER=shadow `
            -e POSTGRES_DB=shadow `
            -e POSTGRES_HOST_AUTH_METHOD=trust `
            -p 5433:5432 postgres:16
          if ($LASTEXITCODE -ne 0) { Write-Host "Echec demarrage shadow database"; exit 1 }
          for ($i = 0; $i -lt 20; $i++) {
            docker exec prisma-shadow-db pg_isready -U shadow | Out-Null
            if ($LASTEXITCODE -eq 0) { Write-Host "shadow database prete"; break }
            Start-Sleep -Seconds 2
          }
          exit 0

      # 8. Garde-fou — échoue si schema.prisma a changé sans migration correspondante.
      #    --exit-code : 0 = en sync, 2 = drift détecté, autre = erreur.
      - name: Check pending migrations
        run: |
          $ErrorActionPreference = 'Continue'
          npx prisma migrate diff `
            --from-migrations ./prisma/migrations `
            --to-schema-datamodel prisma/schema.prisma `
            --shadow-database-url "postgresql://shadow@localhost:5433/shadow" `
            --exit-code *> $null
          $code = $LASTEXITCODE
          if ($code -eq 0) {
            Write-Host "Schema en sync avec les migrations"
          } elseif ($code -eq 2) {
            Write-Host "ERREUR: schema.prisma a des changements sans migration correspondante."
            Write-Host "Lance 'npx prisma migrate dev --name <nom>' pour creer la migration."
            exit 1
          } else {
            Write-Host "ERREUR Prisma (code $code)"
            exit $code
          }

      # 9. Génère le script SQL complet du schéma actuel.
      #    --from-empty : compare uniquement des fichiers, ne touche AUCUNE base.
      - name: Generate migration script
        run: |
          $ErrorActionPreference = 'Continue'
          $sql = (npx prisma migrate diff `
            --from-empty `
            --to-schema-datamodel prisma/schema.prisma `
            --script | Out-String)
          if ($LASTEXITCODE -ne 0) { Write-Host "Echec generation du script"; exit 1 }
          [System.IO.File]::WriteAllText("$($PWD.Path)\migration.sql", $sql)
          $lines = ($sql -split "`n").Count
          Write-Host "Script genere : $lines lignes"
          exit 0

      # 10. Publie le script comme artefact récupérable dans GitHub Actions
      - name: Upload migration artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-script
          path: migration.sql
          retention-days: 30

      # 11. Nettoie la base jetable (même si une étape précédente a échoué)
      - name: Stop shadow database
        if: always()
        run: |
          $ErrorActionPreference = 'Continue'
          if (docker ps -aq -f name=prisma-shadow-db) { docker rm -f prisma-shadow-db | Out-Null }
          exit 0

      # ────────────────────────────────────────────────────────────
      # PARTIE 3 — Image Docker : construire → vérifier → publier
      # ────────────────────────────────────────────────────────────

      # 12. Calcule le nom de l'image (GHCR exige des minuscules).
      #     ghcr.io/<owner>/<repo>  →  déposé dans $env:IMAGE pour les étapes suivantes.
      - name: Set image name
        run: |
          $image = "ghcr.io/" + "${{ github.repository }}".ToLower()
          "IMAGE=$image" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Image : $image"

      # 13. Construit l'image "candidate", taguée avec le SHA du commit.
      #     Pas de `latest` ici : latest = "derniere version PUBLIEE",
      #     il ne sera posé qu'a la publication d'une vraie version (etape 17).
      - name: Build Docker image
        run: docker build -t "${env:IMAGE}:$env:GITHUB_SHA" .

      # 14. Vérifie le BON FONCTIONNEMENT : on démarre l'image et on attend
      #     un HTTP 200 sur l'accueil. Si l'image ne répond pas → échec du job.
      #     Port 3001 (et non 3000) : le job `deploy` laisse l'app DÉPLOYÉE
      #     tourner en permanence sur 3000. Ce conteneur-ci est éphémère ;
      #     on l'isole sur 3001 pour ne pas entrer en conflit de port.
      - name: Smoke test image
        run: |
          $ErrorActionPreference = 'Continue'
          docker rm -f cesizen-ci 2>$null | Out-Null
          docker run -d --name cesizen-ci -p 3001:3000 "${env:IMAGE}:$env:GITHUB_SHA" | Out-Null
          $ok = $false
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing http://localhost:3001 -TimeoutSec 3
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch { }
            Start-Sleep -Seconds 2
          }
          docker logs cesizen-ci
          docker rm -f cesizen-ci 2>$null | Out-Null
          if (-not $ok) { Write-Host "ERREUR: l'image ne repond pas sur le port 3001"; exit 1 }
          Write-Host "Image fonctionnelle (HTTP 200)"

      # ────────────────────────────────────────────────────────────
      # PARTIE 4 — Versioning semantique (release) — master uniquement
      # ────────────────────────────────────────────────────────────

      # 15. Connexion à GHCR — UNIQUEMENT sur push master (pas sur les PR).
      #     Action officielle : écrit le token sur stdin en binaire (via Node),
      #     ce qui évite la corruption d'encodage du pipe PowerShell sur Windows
      #     et gère le credential store de Docker Desktop.
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 16. semantic-release : analyse les commits conventionnels depuis la
      #     derniere release, calcule la version (feat→MINOR, fix→PATCH,
      #     BREAKING→MAJOR), pose le tag Git vX.Y.Z + cree la Release GitHub.
      #     Ne fait RIEN si aucun commit ne justifie une nouvelle version.
      - name: Semantic release (versioning)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # 17. Publication versionnee : on lit le tag que semantic-release vient
      #     de poser sur le commit courant. S'il existe → on tague l'image
      #     candidate avec la version + latest + sha, et on pousse le tout.
      #     Sinon → aucune version produite, rien a publier.
      - name: Publish versioned image to GHCR
        id: publish
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = (git tag --points-at HEAD) |
            Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
            Select-Object -First 1
          if (-not $tag) {
            Write-Host "Aucune nouvelle version sur ce commit. Rien a publier."
            exit 0
          }
          $version = $tag.TrimStart('v')
          Write-Host "Version publiee : $version"
          docker tag "${env:IMAGE}:$env:GITHUB_SHA" "${env:IMAGE}:$version"
          docker tag "${env:IMAGE}:$env:GITHUB_SHA" "${env:IMAGE}:latest"
          docker push "${env:IMAGE}:$version"          # version immuable (rollback)
          docker push "${env:IMAGE}:latest"            # raccourci mobile
          docker push "${env:IMAGE}:$env:GITHUB_SHA"   # lien direct commit ↔ image
          # Expose la version au job `deploy` (sortie de step → sortie de job).
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — DEPLOY (TP4 : Continuous Deployment local)
  # Déploie automatiquement l'image publiée, sur le MÊME runner local.
  # Ne tourne QUE si le job `ci` a publié une nouvelle version.
  # ════════════════════════════════════════════════════════════════
  deploy:
    needs: ci # attend la fin du job ci (build + tests + publication)
    runs-on: self-hosted
    # Garde-fou : uniquement sur push master ET si une version a été publiée
    # (une release absente ⇒ aucune nouvelle image ⇒ rien à déployer).
    if: >-
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push' &&
      needs.ci.outputs.version != ''
    defaults:
      run:
        shell: powershell

    steps:
      # 1. Récupère les fichiers compose (l'image, elle, vient de GHCR).
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Fabrique le .env à partir des GitHub Secrets (jamais versionné).
      #    docker compose lit automatiquement ce .env du dossier courant.
      - name: Write .env from secrets
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}
        run: |
          $lines = @(
            "POSTGRES_USER=$env:POSTGRES_USER"
            "POSTGRES_PASSWORD=$env:POSTGRES_PASSWORD"
            "POSTGRES_DB=$env:POSTGRES_DB"
            "NUXT_SESSION_PASSWORD=$env:NUXT_SESSION_PASSWORD"
          )
          # WriteAllLines = UTF-8 sans BOM : compose lit le .env sans souci.
          [System.IO.File]::WriteAllLines("$($PWD.Path)\.env", $lines)
          Write-Host ".env genere depuis les secrets"

      # 3. Connexion à GHCR pour tirer l'image (le package peut être privé).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. DÉPLOIEMENT : pull de l'image versionnée, puis migrate → app.
      #    TAG = version publiée (needs.ci.outputs.version) → on déploie
      #    l'artefact EXACT testé en CI.
      - name: Deploy with docker compose
        env:
          TAG: ${{ needs.ci.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @("-f", "docker-compose.yml", "-f", "docker-compose.deploy.yml")
          Write-Host "Deploiement de la version $env:TAG"
          # a) Tire l'image publiée (db postgres = image publique).
          docker compose @files pull
          # b) Migrate (idempotent) PUIS app. --no-build : le `build:` du
          #    compose de base coexiste avec `image:` ; on interdit tout
          #    rebuild pour n'utiliser QUE l'image tiree. depends_on garantit
          #    l'ordre db(healthy) → migrate(completed) → app.
          #    PAS de `down -v` : les volumes (donc la base) sont preserves.
          docker compose @files up -d --no-build

      # 5. Test immédiat post-déploiement : l'app doit répondre HTTP 200
      #    sur le port 3000 (le port du service déployé, qui reste en vie).
      - name: Smoke test (post-deploy)
        run: |
          $ErrorActionPreference = 'Continue'
          $ok = $false
          for ($i = 0; $i -lt 20; $i++) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing http://localhost:3000 -TimeoutSec 3
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch { }
            Start-Sleep -Seconds 3
          }
          if (-not $ok) {
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml logs app
            Write-Host "ERREUR: l'app est injoignable apres deploiement"; exit 1
          }
          Write-Host "Deploiement OK — application en ligne (HTTP 200)"
