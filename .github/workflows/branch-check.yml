name: Branch Name Check

on:
  push:
    branches-ignore:
      - main
      - master
      - develop
  pull_request:

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    name: Validate branch name
    steps:
      - name: Check branch naming convention
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          protected="^(main|master|develop)$"
          pattern="^(feature|fix|hotfix|release|docs|chore|refactor|test)/.+"

          if echo "$branch" | grep -qE "$protected"; then
            echo "✅ Branche protégée exemptée : '$branch'"
            exit 0
          fi

          if ! echo "$branch" | grep -qE "$pattern"; then
            echo "❌ Nom de branche invalide : '$branch'"
            echo ""
            echo "Format attendu : <type>/<description>"
            echo "Types autorisés : feature, fix, hotfix, release, docs, chore, refactor, test"
            echo "Exemple : feature/login-page"
            exit 1
          fi

          echo "✅ Nom de branche valide : '$branch'"

  # Impose le flux feature/* → develop → master : une PR vers `master`
  # ne peut venir QUE de `develop`. À rendre "required" dans la protection
  # de branche de master pour bloquer tout autre merge.
  enforce-master-source:
    runs-on: ubuntu-latest
    name: Enforce master PR source
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    steps:
      - name: Only allow PRs from develop into master
        run: |
          if [ "$GITHUB_HEAD_REF" != "develop" ]; then
            echo "❌ Une PR vers 'master' doit venir de 'develop' (source : '$GITHUB_HEAD_REF')"
            echo "Flux imposé : feature/* → develop → master"
            exit 1
          fi
          echo "✅ Source valide : develop → master"
