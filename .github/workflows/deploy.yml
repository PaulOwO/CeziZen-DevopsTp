name: Deploy (manuel)

# Déploiement MANUEL à la demande — complément du déploiement automatique
# (qui vit dans ci.yml, déclenché par un push master avec release).
# Sert aux tests : rejouer un déploiement, tester l'idempotence, ou
# redéployer une version précise (rollback) sans créer de commit.
#
# Lancement : onglet Actions → "Deploy (manuel)" → Run workflow → saisir le tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag d'image à déployer (ex. 1.2.0, ou latest)"
        required: true
        default: latest

permissions:
  contents: read
  packages: read # nécessaire pour tirer l'image depuis GHCR

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell

    steps:
      # 1. Fichiers compose (l'image vient de GHCR, pas du checkout).
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # 2. .env généré depuis les secrets (jamais versionné).
      - name: Write .env from secrets
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}
        run: |
          $lines = @(
            "POSTGRES_USER=$env:POSTGRES_USER"
            "POSTGRES_PASSWORD=$env:POSTGRES_PASSWORD"
            "POSTGRES_DB=$env:POSTGRES_DB"
            "NUXT_SESSION_PASSWORD=$env:NUXT_SESSION_PASSWORD"
          )
          [System.IO.File]::WriteAllLines("$($PWD.Path)\.env", $lines)
          Write-Host ".env genere depuis les secrets"

      # 3. Connexion à GHCR pour tirer l'image.
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Déploiement du tag demandé. Même logique que le job auto :
      #    pull → migrate (idempotent) → app, --no-build, volumes preserves.
      - name: Deploy with docker compose
        env:
          TAG: ${{ inputs.tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @("-f", "docker-compose.yml", "-f", "docker-compose.deploy.yml")
          Write-Host "Deploiement manuel de la version $env:TAG"
          docker compose @files pull
          docker compose @files up -d --no-build

      # 5. Test immédiat : HTTP 200 sur le port 3000.
      - name: Smoke test (post-deploy)
        run: |
          $ErrorActionPreference = 'Continue'
          $ok = $false
          for ($i = 0; $i -lt 20; $i++) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing http://localhost:3000 -TimeoutSec 3
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch { }
            Start-Sleep -Seconds 3
          }
          if (-not $ok) {
            docker compose -f docker-compose.yml -f docker-compose.deploy.yml logs app
            Write-Host "ERREUR: l'app est injoignable apres deploiement"; exit 1
          }
          Write-Host "Deploiement OK - application en ligne (HTTP 200)"
